name: Encoding Policy

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  encoding-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest==9.0.2

      - name: Run encoding guard
        run: python scripts/run_encoding_guard.py
